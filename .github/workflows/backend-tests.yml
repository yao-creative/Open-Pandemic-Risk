name: Backend Tests

on:
  push:
    branches:
      - main
      - develop
      - proposal/**
  pull_request:

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Sync backend deps
        run: |
          cd backend
          uv sync --frozen --dev

      - name: Run unit/contract/local integration tests
        run: make test-ci
        env:
          PROMED_API_KEY: ${{ secrets.PROMED_API_KEY }}
