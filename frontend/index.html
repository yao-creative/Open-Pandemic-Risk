<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Outbreak Watch</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Serif:wght@500;600&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #f4f0e6;
        --paper: rgba(255, 255, 255, 0.9);
        --paper-strong: rgba(255, 255, 255, 0.97);
        --ink: #11221d;
        --muted: #63736c;
        --line: rgba(17, 34, 29, 0.12);
        --accent: #1b6855;
        --accent-soft: rgba(27, 104, 85, 0.1);
        --critical: #b7472c;
        --critical-soft: rgba(183, 71, 44, 0.14);
        --high: #c17118;
        --high-soft: rgba(193, 113, 24, 0.14);
        --medium: #9d8426;
        --medium-soft: rgba(157, 132, 38, 0.14);
        --low: #2f8151;
        --low-soft: rgba(47, 129, 81, 0.14);
        --shadow: 0 24px 68px rgba(17, 34, 29, 0.08);
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
        background:
          radial-gradient(circle at top left, rgba(27, 104, 85, 0.16), transparent 24%),
          radial-gradient(circle at 80% 12%, rgba(183, 71, 44, 0.12), transparent 20%),
          linear-gradient(180deg, #faf6ee 0%, #f1eadd 56%, #eadfce 100%);
        color: var(--ink);
        font-family: "IBM Plex Sans", sans-serif;
      }

      body {
        padding: 24px;
      }

      button,
      a {
        font: inherit;
      }

      h1,
      h2,
      h3,
      p {
        margin: 0;
      }

      h1,
      h2 {
        font-family: "IBM Plex Serif", serif;
      }

      h1 {
        font-size: clamp(2.7rem, 4vw, 4.2rem);
        line-height: 0.95;
      }

      h2 {
        font-size: 2rem;
      }

      h3 {
        font-size: 1.05rem;
      }

      .page-shell {
        max-width: 1520px;
        margin: 0 auto;
        display: grid;
        gap: 20px;
      }

      .panel {
        background: var(--paper);
        border: 1px solid var(--line);
        border-radius: 28px;
        box-shadow: var(--shadow);
        backdrop-filter: blur(14px);
      }

      .hero,
      .map-panel,
      .focus-panel,
      .detail-panel,
      .ranking-panel,
      .stage-panel {
        padding: 24px;
      }

      .hero-grid,
      .overview-grid,
      .hero-metrics,
      .focus-metric-grid,
      .factor-grid,
      .detail-columns,
      .stage-grid,
      .table-shell,
      .detail-list,
      .signal-pill-row,
      .map-status-row {
        display: grid;
        gap: 16px;
      }

      .hero-grid {
        grid-template-columns: minmax(0, 1.1fr) minmax(340px, 0.9fr);
        gap: 24px;
      }

      .overview-grid {
        grid-template-columns: minmax(0, 1.2fr) minmax(340px, 0.8fr);
        align-items: start;
      }

      .hero-metrics,
      .focus-metric-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .factor-grid {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }

      .detail-columns {
        grid-template-columns: minmax(0, 0.95fr) minmax(0, 1.05fr);
      }

      .stage-grid {
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      }

      .eyebrow,
      .section-kicker,
      .risk-pill,
      .stage-badge,
      .signal-pill {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: fit-content;
        padding: 7px 11px;
        border-radius: 999px;
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      .eyebrow,
      .section-kicker {
        background: rgba(255, 255, 255, 0.8);
        border: 1px solid rgba(27, 104, 85, 0.14);
        color: var(--accent);
      }

      .muted {
        color: var(--muted);
      }

      .mono,
      .stat-value,
      .detail-score,
      .contributor-metrics,
      .stage-metrics,
      .marker-rank {
        font-family: "IBM Plex Mono", monospace;
      }

      .hero-copy,
      .stat-card,
      .factor-card,
      .detail-card,
      .stage-card,
      .status-card,
      .focus-score-block {
        display: grid;
        gap: 10px;
      }

      .hero-copy {
        align-content: start;
      }

      .hero-actions {
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
      }

      .button {
        appearance: none;
        border: 0;
        border-radius: 999px;
        padding: 12px 18px;
        font-weight: 700;
        cursor: pointer;
        text-decoration: none;
      }

      .button-primary {
        background: var(--ink);
        color: white;
      }

      .button-secondary {
        background: rgba(255, 255, 255, 0.92);
        color: var(--ink);
        border: 1px solid var(--line);
      }

      .stat-card,
      .factor-card,
      .detail-card,
      .stage-card,
      .status-card,
      .empty-state,
      .ranking-row,
      .focus-panel,
      .detail-panel {
        background: var(--paper-strong);
        border: 1px solid var(--line);
        border-radius: 22px;
      }

      .stat-card,
      .factor-card,
      .detail-card,
      .stage-card,
      .status-card,
      .empty-state {
        padding: 16px;
      }

      .stat-card.compact {
        padding: 14px;
      }

      .stat-label,
      .status-label {
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--muted);
      }

      .stat-value,
      .factor-score,
      .detail-score {
        font-size: 1.7rem;
        line-height: 1;
      }

      .hero-small {
        font-size: 1.15rem;
        line-height: 1.35;
      }

      .section-head {
        display: flex;
        justify-content: space-between;
        gap: 16px;
        align-items: start;
        margin-bottom: 16px;
      }

      .map-status-row {
        grid-template-columns: repeat(2, minmax(0, 1fr));
        margin-bottom: 14px;
      }

      .status-card.active {
        border-color: rgba(27, 104, 85, 0.28);
        background: linear-gradient(135deg, rgba(27, 104, 85, 0.1), rgba(255, 255, 255, 0.96));
      }

      .status-card.quiet {
        background: rgba(255, 255, 255, 0.86);
      }

      .world-map {
        position: relative;
        min-height: 500px;
        overflow: hidden;
        border-radius: 24px;
        border: 1px solid rgba(17, 34, 29, 0.08);
        background:
          radial-gradient(circle at top left, rgba(27, 104, 85, 0.12), transparent 34%),
          radial-gradient(circle at 90% 18%, rgba(183, 71, 44, 0.1), transparent 18%),
          linear-gradient(180deg, rgba(238, 245, 241, 0.96), rgba(219, 231, 226, 0.88));
      }

      .world-grid {
        position: absolute;
        inset: 0;
        background-image:
          linear-gradient(rgba(17, 34, 29, 0.05) 1px, transparent 1px),
          linear-gradient(90deg, rgba(17, 34, 29, 0.05) 1px, transparent 1px);
        background-size: 44px 44px;
      }

      .world-backdrop {
        position: absolute;
        inset: 18px;
        width: calc(100% - 36px);
        height: calc(100% - 36px);
        pointer-events: none;
      }

      .world-backdrop path {
        fill: rgba(27, 104, 85, 0.14);
        stroke: rgba(17, 34, 29, 0.12);
        stroke-width: 2;
      }

      .map-region-label {
        position: absolute;
        font-size: 11px;
        font-weight: 800;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: rgba(17, 34, 29, 0.45);
        pointer-events: none;
      }

      .map-region-americas {
        left: 12%;
        top: 8%;
      }

      .map-region-emea {
        left: 42%;
        top: 11%;
      }

      .map-region-apac {
        left: 73%;
        top: 13%;
      }

      .map-legend {
        display: flex;
        align-items: center;
        flex-wrap: wrap;
        gap: 10px;
        margin-bottom: 14px;
      }

      .legend-note,
      .map-note,
      .focus-context,
      .detail-intro {
        color: var(--muted);
        line-height: 1.5;
      }

      .map-marker {
        position: absolute;
        transform: translate(-50%, -50%);
        display: grid;
        place-items: center;
        border-radius: 50%;
        border: 2px solid rgba(255, 255, 255, 0.92);
        box-shadow: 0 0 0 7px rgba(17, 34, 29, 0.05);
        cursor: pointer;
        transition:
          transform 140ms ease,
          box-shadow 140ms ease,
          border-color 140ms ease;
      }

      .map-marker:hover {
        transform: translate(-50%, -50%) scale(1.08);
      }

      .map-marker.selected {
        transform: translate(-50%, -50%) scale(1.14);
        box-shadow:
          0 0 0 12px rgba(17, 34, 29, 0.11),
          0 16px 28px rgba(17, 34, 29, 0.18);
        border-color: rgba(17, 34, 29, 0.92);
      }

      .map-marker.leader {
        box-shadow:
          0 0 0 10px rgba(193, 113, 24, 0.12),
          0 0 0 18px rgba(193, 113, 24, 0.04);
      }

      .marker-rank {
        font-size: 11px;
        font-weight: 700;
        color: white;
      }

      .map-label {
        position: absolute;
        left: 50%;
        font-size: 11px;
        font-weight: 800;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: rgba(17, 34, 29, 0.68);
        white-space: nowrap;
        pointer-events: none;
      }

      .map-marker.selected .map-label {
        color: var(--ink);
      }

      .focus-panel {
        padding: 24px;
      }

      .focus-score-block {
        justify-items: end;
        align-content: start;
      }

      .signal-pill {
        background: rgba(17, 34, 29, 0.06);
        color: var(--ink);
        border: 1px solid rgba(17, 34, 29, 0.08);
      }

      .detail-signals {
        margin-bottom: 18px;
      }

      .table-header {
        display: grid;
        grid-template-columns: 56px minmax(220px, 1.15fr) 120px 110px 120px minmax(240px, 1fr);
        gap: 14px;
        padding: 0 16px 10px;
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--muted);
      }

      .ranking-row {
        display: grid;
        grid-template-columns: 56px minmax(220px, 1.15fr) 120px 110px 120px minmax(240px, 1fr);
        align-items: center;
        gap: 14px;
        padding: 14px 16px;
        text-align: left;
        cursor: pointer;
      }

      .ranking-row.selected {
        border-color: rgba(27, 104, 85, 0.3);
        background: linear-gradient(135deg, rgba(27, 104, 85, 0.08), rgba(255, 255, 255, 0.96));
      }

      .ranking-rank {
        width: 40px;
        height: 40px;
        border-radius: 50%;
        display: grid;
        place-items: center;
        background: var(--accent-soft);
        color: var(--accent);
        font-weight: 800;
      }

      .ranking-country,
      .ranking-score,
      .ranking-factor,
      .stage-top,
      .contributor-row {
        display: grid;
        gap: 4px;
      }

      .ranking-band {
        justify-self: start;
      }

      .risk-pill {
        border: 1px solid transparent;
      }

      .risk-critical {
        background: var(--critical-soft);
        color: var(--critical);
      }

      .risk-high {
        background: var(--high-soft);
        color: var(--high);
      }

      .risk-medium {
        background: var(--medium-soft);
        color: var(--medium);
      }

      .risk-low {
        background: var(--low-soft);
        color: var(--low);
      }

      .factor-bar {
        width: 100%;
        height: 10px;
        border-radius: 999px;
        background: rgba(17, 34, 29, 0.08);
        overflow: hidden;
      }

      .factor-bar span {
        display: block;
        height: 100%;
        border-radius: inherit;
        background: linear-gradient(90deg, var(--accent), #2da67c);
      }

      .detail-panel {
        transition:
          transform 160ms ease,
          border-color 160ms ease,
          box-shadow 160ms ease;
      }

      .detail-panel.flash {
        border-color: rgba(27, 104, 85, 0.32);
        box-shadow:
          0 0 0 4px rgba(27, 104, 85, 0.1),
          var(--shadow);
        transform: translateY(-2px);
      }

      .detail-list-scroll {
        max-height: 460px;
        overflow: auto;
      }

      .contributor-row {
        grid-template-columns: minmax(0, 1fr) auto;
        align-items: center;
        padding: 12px 0;
        border-bottom: 1px solid var(--line);
      }

      .contributor-row:last-child {
        border-bottom: 0;
        padding-bottom: 0;
      }

      .contributor-meta {
        line-height: 1.45;
      }

      .contributor-metrics {
        justify-items: end;
        font-size: 12px;
        color: var(--muted);
      }

      .stage-card.ok {
        border-color: rgba(47, 129, 81, 0.24);
      }

      .stage-card.active {
        border-color: rgba(27, 104, 85, 0.24);
      }

      .stage-card.warn {
        border-color: rgba(183, 71, 44, 0.24);
      }

      .stage-badge {
        background: rgba(17, 34, 29, 0.08);
        color: var(--ink);
      }

      .stage-metrics {
        margin: 0;
        padding: 12px;
        border-radius: 16px;
        background: #111917;
        color: #deebe5;
        white-space: pre-wrap;
        word-break: break-word;
        font-size: 12px;
      }

      .empty-state {
        color: var(--muted);
      }

      @media (max-width: 1260px) {
        .hero-grid,
        .overview-grid,
        .detail-columns {
          grid-template-columns: 1fr;
        }

        .table-header,
        .ranking-row {
          grid-template-columns: 52px minmax(180px, 1fr) 120px 110px 110px;
        }

        .ranking-factor {
          grid-column: 2 / -1;
        }
      }

      @media (max-width: 860px) {
        body {
          padding: 14px;
        }

        .hero,
        .map-panel,
        .focus-panel,
        .detail-panel,
        .ranking-panel,
        .stage-panel {
          padding: 18px;
        }

        .hero-metrics,
        .focus-metric-grid,
        .factor-grid,
        .map-status-row {
          grid-template-columns: 1fr;
        }

        .table-header {
          display: none;
        }

        .ranking-row {
          grid-template-columns: 44px 1fr;
        }

        .ranking-band,
        .ranking-score,
        .ranking-factor {
          grid-column: 2 / -1;
        }

        .section-head {
          flex-direction: column;
        }

        .hero-actions {
          flex-direction: column;
        }

        .hero-actions .button {
          width: 100%;
          text-align: center;
        }

        .world-map {
          min-height: 360px;
        }

        .contributor-row {
          grid-template-columns: 1fr;
        }

        .contributor-metrics {
          justify-items: start;
        }
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
