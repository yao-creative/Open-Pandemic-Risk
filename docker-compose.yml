services:
  backend:
    build:
      context: ./backend
    develop:
      watch:
        - action: sync+restart
          path: ./backend/app
          target: /app/app
        - action: rebuild
          path: ./backend/pyproject.toml
        - action: rebuild
          path: ./backend/uv.lock
        - action: rebuild
          path: ./backend/Dockerfile
    env_file:
      - .env
    ports:
      - "8010:8010"
    volumes:
      - ./ml:/app/ml:ro
      - backend_data:/app/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys;sys.exit(0 if urllib.request.urlopen('http://localhost:8010/readyz').getcode()==200 else 1)"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s

  frontend:
    build:
      context: ./frontend
    environment:
      - VITE_API_BASE_URL=http://127.0.0.1:8010
    ports:
      - "5173:5173"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  backend_data:
